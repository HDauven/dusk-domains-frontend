    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Dusk Domains",
        "url": "https://dusk.domains/",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "Search, register and manage .dusk domains for Dusk wallets, contracts and apps.",

      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(() => {
        const walletRequestPattern = /(?=.*(?:wallet|profile request|dusk_requestProfiles|site is not connected))(?=.*(?:locked|reject|denied|cancel|not connected|unauthori[sz]ed))/i
        window.addEventListener('unhandledrejection', (event) => {
          const reason = event.reason
          const message = reason instanceof Error ? reason.message : String(reason || '')
          if (!walletRequestPattern.test(message)) return

          event.preventDefault()
          event.stopImmediatePropagation()
          window.dispatchEvent(new CustomEvent('dusk-domains:wallet-request-error', {
            detail: { message },
          }))
        }, true)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
